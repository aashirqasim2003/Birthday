<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nimmi 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Pacifico&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#e8c97e; --gold2:#f5e0a8; --rose:#f4a0b0;
  --cream:#fdf6ec; --dark:#0d0810; --purple:#1a0d2e;
}
html,body { width:100%; height:100%; overflow:hidden; background:var(--dark); font-family:'DM Sans',sans-serif; color:var(--cream); }

/* CANVAS */
#bg-canvas { position:fixed; inset:0; z-index:0; }

/* ── COUNTDOWN ── */
#screen-countdown {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  background:radial-gradient(ellipse at center,#1a0d2e 0%,#0d0810 100%);
}
.cd-label { font-family:'Cormorant Garamond',serif; font-size:0.9rem; letter-spacing:0.45em; text-transform:uppercase; color:rgba(232,201,126,0.5); }
#cd-num {
  font-family:'Cormorant Garamond',serif; font-size:clamp(8rem,22vw,17rem); font-weight:700; line-height:1;
  background:linear-gradient(135deg,#f5e0a8 0%,#e8c97e 50%,#b8902e 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 60px rgba(232,201,126,0.35));
}
#cd-num.pop { animation:countPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes countPop {
  0%{transform:scale(0.2);opacity:0;} 60%{transform:scale(1.18);} 100%{transform:scale(1);opacity:1;}
}

/* ── HERO ── */
#screen-hero {
  position:fixed; inset:0; z-index:10;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:20px; gap:4px;
}
.h-date { font-size:0.72rem; letter-spacing:0.5em; text-transform:uppercase; color:rgba(232,201,126,0.55); margin-bottom:10px; animation:slideD 0.9s 0.2s ease both; }
.h-hb { font-family:'Cormorant Garamond',serif; font-size:clamp(1.5rem,4.5vw,3.5rem); font-weight:300; font-style:italic; color:rgba(245,224,168,0.85); animation:slideD 0.9s 0.4s ease both; }
.h-name {
  font-family:'Pacifico',cursive; font-size:clamp(3rem,11vw,8.5rem);
  background:linear-gradient(135deg,#f5e0a8 0%,#e8c97e 30%,#f4a0b0 60%,#f5e0a8 100%);
  background-size:200% 200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:slideD 0.9s 0.55s ease both, shimmer 3s 1.5s linear infinite;
  filter:drop-shadow(0 0 30px rgba(244,160,176,0.25));
}
.h-love { font-size:clamp(1.4rem,3.5vw,2.2rem); animation:heartPop 0.7s 1s cubic-bezier(0.34,1.56,0.64,1) both, pulse 1.6s 1.7s ease-in-out infinite; }
.h-cake { font-size:clamp(3.5rem,9vw,6.5rem); animation:floatCake 3s ease-in-out infinite, slideD 0.9s 0.45s ease both; filter:drop-shadow(0 8px 25px rgba(232,201,126,0.2)); margin:8px 0; }
.h-conf { font-size:clamp(1.1rem,3vw,1.8rem); animation:slideD 0.9s 0.9s ease both; }
.h-btn-wrap { margin-top:20px; animation:slideD 0.9s 1.1s ease both; }
#gift-btn {
  font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase;
  padding:15px 42px; background:transparent; border:1.5px solid var(--gold); color:var(--gold); cursor:pointer;
  transition:all 0.35s ease; position:relative; overflow:hidden;
}
#gift-btn::before { content:''; position:absolute; inset:0; background:rgba(232,201,126,0.1); transform:scaleX(0); transform-origin:left; transition:transform 0.4s ease; }
#gift-btn:hover::before { transform:scaleX(1); }

@keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes slideD { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:none} }
@keyframes heartPop { from{transform:scale(0);opacity:0} 60%{transform:scale(1.3)} to{transform:scale(1);opacity:1} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
@keyframes floatCake { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-10px) rotate(2deg)} }

/* ── POPUP ── */
#popup-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(8px);
  z-index:200; display:none; align-items:center; justify-content:center;
}
#popup-overlay.show { display:flex; }
.pop-box {
  background:linear-gradient(135deg,#130820 0%,#1a0d2e 100%);
  border:1px solid rgba(232,201,126,0.28);
  padding:46px 50px; text-align:center; max-width:430px; width:90%;
  box-shadow:0 0 90px rgba(232,201,126,0.08), 0 0 200px rgba(244,160,176,0.04);
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.pop-icon { font-size:3rem; display:block; margin-bottom:12px; }
.pop-title { font-family:'Cormorant Garamond',serif; font-size:1.55rem; color:var(--gold2); margin-bottom:4px; }
.pop-sub { font-size:0.72rem; letter-spacing:0.22em; text-transform:uppercase; color:rgba(232,201,126,0.38); margin-bottom:28px; }
#runway { width:100%; height:90px; position:relative; }
#run-btn {
  position:absolute; left:50%; top:12px; transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:600; letter-spacing:0.15em;
  padding:12px 30px; background:rgba(232,201,126,0.1); border:1.5px solid var(--gold); color:var(--gold);
  cursor:pointer; white-space:nowrap; transition:all 0.35s cubic-bezier(0.34,1.4,0.64,1);
}
#run-btn:hover { background:rgba(232,201,126,0.18); }
#cheeky { font-size:0.82rem; font-style:italic; color:var(--rose); min-height:22px; margin-top:6px; opacity:0; transition:opacity 0.4s; }

/* ── WISHES SCREEN ── */
#screen-wishes {
  position:fixed; inset:0; z-index:300;
  background:radial-gradient(ellipse at top,#1a0d2e 0%,#0d0810 65%);
  display:none; flex-direction:column; align-items:center; overflow:hidden;
}
#screen-wishes.show { display:flex; }
.wh {
  flex-shrink:0; padding:32px 20px 14px; text-align:center; width:100%;
  background:linear-gradient(to bottom,#0d0810 60%,transparent); position:relative; z-index:2;
}
.wh-eye { font-size:0.68rem; letter-spacing:0.45em; text-transform:uppercase; color:rgba(232,201,126,0.38); margin-bottom:6px; }
.wh-title {
  font-family:'Cormorant Garamond',serif; font-size:clamp(1.7rem,4.5vw,2.8rem); font-weight:700; font-style:italic;
  background:linear-gradient(135deg,var(--gold2),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.wh-line { width:55px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:10px auto 0; }

.ws-scroll { flex:1; overflow-y:auto; width:100%; padding:14px 18px 80px; scroll-behavior:smooth; }
.ws-scroll::-webkit-scrollbar { width:3px; }
.ws-scroll::-webkit-scrollbar-thumb { background:rgba(232,201,126,0.18); border-radius:2px; }
.ws-inner { max-width:650px; margin:0 auto; }

.intro-blk {
  padding:20px 4px 16px; border-bottom:1px solid rgba(232,201,126,0.1); margin-bottom:6px;
  font-family:'Cormorant Garamond',serif; font-size:clamp(1rem,2.4vw,1.28rem);
  font-style:italic; line-height:1.9; color:rgba(245,224,168,0.9); text-align:center;
}
.intro-blk .hl { color:var(--rose); font-weight:600; }

.w-row {
  display:flex; gap:12px; align-items:flex-start;
  padding:13px 0; border-bottom:1px solid rgba(232,201,126,0.055);
  opacity:0; transform:translateY(10px); transition:opacity 0.5s ease,transform 0.5s ease;
}
.w-row.vis { opacity:1; transform:none; }
.wn { font-size:0.58rem; color:rgba(232,201,126,0.22); min-width:22px; padding-top:4px; font-variant-numeric:tabular-nums; }
.wi { font-size:0.9rem; min-width:20px; }
.wt { font-size:0.88rem; color:rgba(245,230,200,0.8); line-height:1.7; font-weight:300; }

/* Scroll popups */
.sp {
  margin:24px 0; background:linear-gradient(135deg,rgba(26,13,46,0.97),rgba(13,8,16,0.97));
  border:1px solid rgba(232,201,126,0.18); padding:30px 26px; text-align:center;
  display:none; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.sp.show { display:block; }
.sp-ico { font-size:2.4rem; margin-bottom:8px; }
.sp-q { font-family:'Cormorant Garamond',serif; font-size:1.25rem; color:var(--gold2); margin-bottom:4px; }
.sp-sub { font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(232,201,126,0.38); margin-bottom:18px; }
.sp-opts { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.sp-opt {
  font-family:'Cormorant Garamond',serif; font-size:1.05rem; padding:10px 22px;
  border:1px solid rgba(232,201,126,0.32); background:transparent; color:var(--gold);
  cursor:pointer; transition:all 0.3s ease;
}
.sp-opt:hover { background:rgba(232,201,126,0.1); border-color:var(--gold); }
.sp-opt:disabled { opacity:0.4; cursor:default; }
.sp-res { display:none; margin-top:14px; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.sp-res-ico { font-size:2.8rem; }
.sp-res-txt {
  font-size:0.85rem; color:rgba(245,224,168,0.72); font-style:italic;
  margin-top:8px; line-height:1.75; white-space:pre-line;
}
.sp-res-txt.dua {
  font-family:'Cormorant Garamond',serif; font-size:1rem;
  color:rgba(245,224,168,0.9); font-style:italic; line-height:1.9;
}
.sp-cont { margin-top:12px; font-size:0.72rem; color:rgba(232,201,126,0.3); letter-spacing:0.12em; display:none; }

/* Final */
.final-blk { padding:44px 12px; text-align:center; }
.final-blk h2 {
  font-family:'Pacifico',cursive; font-size:clamp(1.8rem,5.5vw,3.5rem);
  background:linear-gradient(135deg,var(--gold2),var(--rose),var(--gold));
  background-size:200% 200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 3s linear infinite; margin-bottom:18px;
}
.final-blk p { font-family:'Cormorant Garamond',serif; font-size:clamp(0.92rem,2vw,1.1rem); font-style:italic; color:rgba(245,224,168,0.75); line-height:1.85; }
.final-ico { font-size:1.8rem; margin:14px 0; letter-spacing:0.25em; }

/* Petals */
.petal { position:fixed; pointer-events:none; z-index:5; animation:petalFall linear infinite; opacity:0.45; }
@keyframes petalFall {
  0%{transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0.55}
  50%{transform:translateY(50vh) rotate(180deg) translateX(25px)}
  100%{transform:translateY(110vh) rotate(360deg) translateX(-15px);opacity:0}
}

@keyframes popIn { from{opacity:0;transform:scale(0.75)} to{opacity:1;transform:scale(1)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- COUNTDOWN -->
<div id="screen-countdown">
  <div class="cd-label">Something beautiful is coming ✨</div>
  <div id="cd-num">6</div>
</div>

<!-- HERO -->
<div id="screen-hero">
  <div class="h-date">21st April &nbsp;·&nbsp; The Most Special Day</div>
  <div class="h-hb">Happy Birthday</div>
  <div class="h-name">Nimmi</div>
  <div class="h-love">❤️</div>
  <div class="h-cake">🎂</div>
  <div class="h-conf">🎉 &nbsp; It's finally your day! &nbsp; 🎉</div>
  <div class="h-btn-wrap">
    <button id="gift-btn" onclick="openPopup()">Open Your Gift &nbsp;🎁</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup-overlay">
  <div class="pop-box">
    <span class="pop-icon">🎁</span>
    <p class="pop-title">Your Gift Awaits, Nimmi</p>
    <p class="pop-sub">something made with love</p>
    <div id="runway">
      <button id="run-btn" onmouseenter="runAway()" onclick="openWishes()">Open Your Gift ✨</button>
    </div>
    <div id="cheeky"></div>
  </div>
</div>

<!-- WISHES -->
<div id="screen-wishes">
  <div class="wh">
    <div class="wh-eye">🌸 &nbsp; with every beat of my heart &nbsp; 🌸</div>
    <div class="wh-title">For My Nimmi</div>
    <div class="wh-line"></div>
  </div>
  <div class="ws-scroll" id="ws-scroll">
    <div class="ws-inner" id="ws-inner"></div>
  </div>
</div>

<script>
/* ═══ CANVAS ═══ */
const cv = document.getElementById('bg-canvas');
const cx = cv.getContext('2d');
function rz(){ cv.width=innerWidth; cv.height=innerHeight; }
rz(); window.addEventListener('resize', rz);

const stars = Array.from({length:200}, ()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.2+0.2, a:Math.random(),
  da:(Math.random()*0.4+0.1)*(Math.random()>.5?1:-1)
}));
let parts=[];

function boom(){
  const cols=['#e8c97e','#f5e0a8','#f4a0b0','#fff','#ffd700','#ff9abc','#ffe066','#c8f7c5'];
  const x=Math.random()*innerWidth, y=Math.random()*innerHeight*0.55;
  const col=cols[Math.floor(Math.random()*cols.length)];
  for(let i=0;i<65;i++){
    const a=(i/65)*Math.PI*2, s=Math.random()*5+1.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,al:1,col,r:Math.random()*2.5+1,g:0.065+Math.random()*0.04});
  }
}
let fwInt;
function startFW(){
  boom();
  fwInt=setInterval(boom,650);
  setTimeout(()=>clearInterval(fwInt),9000);
}
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{ s.a+=s.da*0.01; if(s.a>1||s.a<0)s.da*=-1;
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(232,201,126,${s.a*0.55})`; cx.fill();
  });
  parts=parts.filter(p=>p.al>0.02);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=0.98; p.al-=0.017;
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=p.col+Math.floor(p.al*255).toString(16).padStart(2,'0'); cx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* ═══ COUNTDOWN ═══ */
let cnt=6;
const cdEl=document.getElementById('cd-num');
function tick(){
  cdEl.classList.remove('pop'); void cdEl.offsetWidth; cdEl.classList.add('pop');
  cdEl.textContent=cnt; cnt--;
  if(cnt>=0) setTimeout(tick,850);
  else setTimeout(showHero,600);
}
setTimeout(tick,500);

function showHero(){
  document.getElementById('screen-countdown').style.display='none';
  const h=document.getElementById('screen-hero');
  h.style.display='flex';
  startFW(); spawnPetals();
}

/* ═══ PETALS ═══ */
function spawnPetals(){
  const syms=['🌸','✨','💛','🌺','⭐','💫','🎀','🌟','🎊'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='petal';
    p.textContent=syms[Math.floor(Math.random()*syms.length)];
    p.style.cssText=`left:${Math.random()*100}vw;font-size:${Math.random()*0.9+0.65}rem;animation-duration:${Math.random()*9+7}s;animation-delay:${Math.random()*7}s`;
    document.body.appendChild(p);
  }
}

/* ═══ POPUP / RUNAWAY ═══ */
function openPopup(){
  document.getElementById('popup-overlay').classList.add('show');
  document.getElementById('popup-overlay').style.display='flex';
  rc=0; resetRunBtn();
}
let rc=0;
const cheekys=[
  "😄 Haha ok ok... now click me!",
  "😅 I'm right here, I promise!",
  "😂 Ok final, sorry! Please click me please 🙏"
];
const runPositions=[
  {left:'0px',top:'0px'},
  {right:'0px',top:'0px',left:'auto'},
  {left:'0px',bottom:'0px',top:'auto'},
  {right:'0px',bottom:'0px',left:'auto',top:'auto'},
];

function resetRunBtn(){
  const b=document.getElementById('run-btn');
  b.style.cssText='position:absolute;left:50%;top:12px;transform:translateX(-50%);font-family:"Cormorant Garamond",serif;font-size:1rem;font-weight:600;letter-spacing:0.15em;padding:12px 30px;background:rgba(232,201,126,0.1);border:1.5px solid #e8c97e;color:#e8c97e;cursor:pointer;white-space:nowrap;transition:all 0.35s cubic-bezier(0.34,1.4,0.64,1)';
}

function runAway(){
  if(rc>=3) return;
  rc++;
  const b=document.getElementById('run-btn');
  const ck=document.getElementById('cheeky');
  const pos=runPositions[rc%runPositions.length];
  b.style.transition='all 0.35s cubic-bezier(0.34,1.4,0.64,1)';
  b.style.left=pos.left||'';
  b.style.right=pos.right||'';
  b.style.top=pos.top||'';
  b.style.bottom=pos.bottom||'';
  b.style.transform='none';
  ck.style.opacity='1';
  ck.textContent=cheekys[Math.min(rc-1,cheekys.length-1)];
  if(rc>=3){ b.onmouseenter=null; }
}

function openWishes(){
  document.getElementById('popup-overlay').style.display='none';
  document.getElementById('popup-overlay').classList.remove('show');
  document.getElementById('screen-hero').style.display='none';
  boom(); boom(); boom();
  buildWishes();
  document.getElementById('screen-wishes').classList.add('show');
  startFW(); spawnPetals();
}

/* ═══ WISHES DATA ═══ */
const wishes=[
  ["💛","May Allah bless every single day of your life with joy that never fades."],
  ["🌸","You are the lizard of my life — the most unique, irreplaceable soul I have ever known."],
  ["✨","The beauty you carry, Nimmi, lives not just in your face — it lives in your entire soul."],
  ["💝","You are the person I love most in this world, and I am grateful for you every single day."],
  ["🌿","You matter more than words can ever hold — more than any letter I could ever write."],
  ["🕊️","May Allah grant you a long, healthy life — full of everything you have ever prayed for."],
  ["🌙","I want to spend my whole life with you — every morning, every quiet evening, every moment in between."],
  ["⭐","May your life overflow with barakah in ways you haven't even begun to imagine."],
  ["🌺","May every dua you make in the quiet of the night be answered beautifully by Him."],
  ["💫","You deserve a life filled with noor, with peace, and with so much love."],
  ["🌟","May Allah protect you from every harm and surround you with His endless mercy."],
  ["🎀","Wishing you imaan that grows stronger and deeper with every single sunrise."],
  ["🌸","May your rizq be halal, plentiful, and overflowing with blessing."],
  ["💛","May the people in your life treat you the way your beautiful heart deserves."],
  ["✨","You are someone worth choosing every single day — and I do, Nimmi, without hesitation."],
  ["🌿","May Allah ease every hardship before it even reaches your door."],
  ["🌙","Here's to your dreams — each and every one of them, coming true, InshAllah."],
  ["💝","May your faith be your anchor in every storm that life throws your way."],
  ["🕊️","Wishing you the kind of sabr that is rewarded with the most beautiful outcomes."],
  ["⭐","May you always have someone who sees you the way I see you — completely and unconditionally."],
  ["🌺","Here's to your laughter — the kind that fills entire rooms and heals every heart."],
  ["💫","May every step you take be guided beautifully by Allah's light."],
  ["🌟","Wishing you a year so full of goodness it takes your breath away."],
  ["🎀","May your parents always be proud and may you forever make them smile."],
  ["🌸","Here's to your soft heart — protect it always, but never let it harden."],
  ["💛","May Allah keep you safe in every moment I am not there to be your shield."],
  ["✨","Wishing you the kind of peace that only comes from trusting Him completely."],
  ["🌿","May your home, wherever it may be, always feel like refuge, warmth, and love."],
  ["🌙","Here's to the little things that bring you joy — may you never ever run out of them."],
  ["💝","Wishing you mornings that feel hopeful and evenings that feel like gratitude."],
  ["🕊️","May every person you love be kept close and every worry be kept far away."],
  ["⭐","Here's to your courage — the quiet kind, the kind you don't even recognize in yourself."],
  ["🌺","May Allah write for you a story more beautiful than any you could ever imagine."],
  ["💫","Wishing you a faith that shines brighter than the stars above us tonight."],
  ["🌟","May your heart always find its way back to peace, no matter what comes your way."],
  ["🎀","Here's to you loving yourself even half as much as I love you."],
  ["🌸","May this year mark the beginning of everything you have been patiently waiting for."],
  ["💛","Wishing you companionship that never ever lets you feel alone in this world."],
  ["✨","May every night you cry be followed by a morning that smiles back at you."],
  ["🌿","Here's to your growth — quiet, steady, and absolutely breathtaking to witness."],
  ["🌙","May Allah shower you with His rahma on this day and every day that follows."],
  ["💝","Wishing you a love story written in the heavens — may it unfold gently, exactly as planned."],
  ["🕊️","May your duas travel past every cloud and reach straight to Him."],
  ["⭐","Here's to your resilience — you are so much stronger than you know, Nimmi."],
  ["🌺","Wishing you clarity on the days when everything feels too loud and too much."],
  ["💫","May the angels that protect you always work overtime — you are worth it."],
  ["🌟","Here's to your voice — may it always be heard by exactly the right people."],
  ["🎀","Wishing you celebrations that match your worth — grand, joyful, and overflowing."],
  ["🌸","May every year bring you closer to the life you always pictured for yourself."],
  ["💛","Here's to you, my Nimmi — the person who changed absolutely everything for me."],
];

/* ═══ SCROLL POPUPS ═══ */
const spData={};

function buildScrollPopup(id,after,ico,q,sub,opts){
  const div=document.createElement('div');
  div.className='sp'; div.id=id;
  div.setAttribute('data-after',after);
  spData[id]=opts;
  const optsHtml=opts.map((o,i)=>`<button class="sp-opt" onclick="pickOpt('${id}',${i})">${o.label}</button>`).join('');
  div.innerHTML=`
    <div class="sp-ico">${ico}</div>
    <p class="sp-q">${q}</p>
    <p class="sp-sub">${sub}</p>
    <div class="sp-opts">${optsHtml}</div>
    <div class="sp-res" id="${id}-res">
      <div class="sp-res-ico" id="${id}-ico"></div>
      <div class="sp-res-txt" id="${id}-txt"></div>
    </div>
    <div class="sp-cont" id="${id}-cont">keep scrolling ↓</div>
  `;
  return div;
}

function pickOpt(id,i){
  const opt=spData[id][i];
  const res=document.getElementById(id+'-res');
  const ico=document.getElementById(id+'-ico');
  const txt=document.getElementById(id+'-txt');
  const cont=document.getElementById(id+'-cont');
  ico.textContent=opt.emoji;
  txt.textContent=opt.text;
  if(opt.isDua) txt.className='sp-res-txt dua';
  res.style.display='block';
  cont.style.display='block';
  document.querySelectorAll(`#${id} .sp-opt`).forEach(b=>b.disabled=true);
  boom(); boom();
}

function buildWishes(){
  const inner=document.getElementById('ws-inner');
  inner.innerHTML='';

  // Intro
  const intro=document.createElement('div');
  intro.className='intro-blk w-row';
  intro.innerHTML=`Let me celebrate <span class="hl">the lizard of my life</span> — the beauty of mine, the person I love the most in this entire world, the one who matters above everyone else, the person with whom I want to spend my <em>whole life</em>. <span class="hl">Happy Birthday, Nimmi.</span> May Allah grant you a long life — one exactly as you always wished of — filled with immense barakah, overflowing blessings, and beautiful, unshakeable imaan. 🌸`;
  inner.appendChild(intro);

  const popupDefs=[
    { id:'sp1', after:17, ico:'☕', q:'Okay these wishes are getting long...', sub:'Can I offer you something?',
      opts:[
        {label:'☕ Coffee', emoji:'☕', text:'Here is your coffee — warm, perfect, just like you. Now keep reading! 💛'},
        {label:'🍦 Ice Cream', emoji:'🍨', text:'Your ice cream is served, gorgeous! Keep scrolling 🌸'}
      ]
    },
    { id:'sp2', after:32, ico:'🍕', q:'Still reading? You deserve a treat.', sub:"What's on the menu?",
      opts:[
        {label:'🍕 Pizza', emoji:'🍕', text:'Pizza it is! The perfect companion for reading love letters 🍕✨'},
        {label:'🍔 Burger', emoji:'🍔', text:'Burger incoming! Now keep reading, you 😄🍔'}
      ]
    },
    { id:'sp3', after:43, ico:'✈️', q:'Where do you want to travel with me?', sub:'Your heart, your choice',
      opts:[
        {label:'🕌 Makkah', emoji:'🕌', isDua:true,
          text:`May Allah make you mine in nikkah.\n\nAnd InshAllah, we will go to His House together — where I once stood alone and asked Him for you. Where every prayer I made carried your name. Where I wept and asked the Lord of the worlds to write you for me.\n\nMay Allah bless our journey there — two hearts, one qibla, one home. Ameen. 🤲`
        },
        {label:'🏔️ Switzerland', emoji:'🏔️', text:'Switzerland with you would be the most beautiful dream — snow, silence, mountains, and your smile. InshAllah one day, together. 🏔️✨'}
      ]
    }
  ];

  const popupMap={};
  popupDefs.forEach(pd=>{
    popupMap[pd.after]=buildScrollPopup(pd.id,pd.after,pd.ico,pd.q,pd.sub,pd.opts);
  });

  wishes.forEach((w,i)=>{
    if(popupMap[i]) inner.appendChild(popupMap[i]);
    const row=document.createElement('div');
    row.className='w-row';
    row.innerHTML=`<span class="wn">${String(i+1).padStart(2,'0')}</span><span class="wi">${w[0]}</span><span class="wt">${w[1]}</span>`;
    inner.appendChild(row);
  });

  // Final
  const fin=document.createElement('div');
  fin.className='final-blk w-row';
  fin.innerHTML=`
    <div class="final-ico">🎂 ✨ 💛 🌸 ⭐</div>
    <h2>Happy Birthday, Nimmi!</h2>
    <p>
      Wishing you the happiest of birthdays and the most wonderful, magical year ahead.<br><br>
      Lots and lots of blessings. Mountains of happiness. Oceans of peace.<br><br>
      May every single day ahead be brighter than the one before it.<br><br>
      May Allah always keep you smiling — because your smile, Nimmi, is my absolute favourite thing in this entire world.<br><br>
      <strong style="color:#e8c97e">I love you. Happy Birthday. 💛</strong>
    </p>
    <div class="final-ico" style="margin-top:22px">❤️ 🕊️ 🌙 🌺 💫</div>
  `;
  inner.appendChild(fin);

  // Intersection observer — wish rows
  const obsWish=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('vis'),60); obsWish.unobserve(e.target); } });
  },{threshold:0.08});
  document.querySelectorAll('.w-row').forEach(el=>obsWish.observe(el));

  // Intersection observer — scroll popups
  const scr=document.getElementById('ws-scroll');
  popupDefs.forEach(pd=>{
    const popup=document.getElementById(pd.id);
    if(!popup) return;
    const sentinel=popup.previousElementSibling;
    if(!sentinel) return;
    const obsPop=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting && !popup.classList.contains('seen')){
          popup.classList.add('seen');
          setTimeout(()=>popup.classList.add('show'),300);
          obsPop.unobserve(e.target);
          boom();
        }
      });
    },{threshold:0.6, root:scr});
    obsPop.observe(sentinel);
  });
}
</script>
