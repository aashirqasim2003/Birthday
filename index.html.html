<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nimmi 🎁</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ── Starfield ── */
  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;

  /* ── Screen 1: Hero ── */

    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeInUp 1.4s ease both;

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #c9a96e;
    opacity: 0.8;
  }

  .title-nimmi {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #f5e6c8 0%, #c9a96e 40%, #f5e6c8 70%, #a07840 100%);

    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    filter: drop-shadow(0 0 40px rgba(201,169,110,0.3));
  }

  .title-hb {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 400;
    font-style: italic;
    color: #c9a96e;
    letter-spacing: 0.1em;
    opacity: 0.9;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
  }

  .gift-btn {
    margin-top: 10px;
    padding: 14px 38px;
    background: transparent;
    border: 1px solid rgba(201,169,110,0.5);
    color: #c9a96e;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  .gift-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(201,169,110,0.08);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .gift-btn:hover::before { transform: scaleX(1); }
  .gift-btn:hover { border-color: #c9a96e; letter-spacing: 0.4em; }

  /* ── Popup Overlay ── */
  #popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #popup-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .popup-box {
    background: #0e0e16;
    border: 1px solid rgba(201,169,110,0.25);
    padding: 50px 55px;
    text-align: center;
    max-width: 440px;
    width: 90%;
    position: relative;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;

  .popup-icon { font-size: 3.5rem; margin-bottom: 16px; display: block; }
  .popup-q {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: #f5e6c8;
    margin-bottom: 8px;
  }
  .popup-sub {
    font-size: 0.8rem;
    color: rgba(201,169,110,0.6);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    position: relative;
    min-height: 52px;
  }

  .popup-yes, .popup-no {
    padding: 13px 36px;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;

    border-color: #c9a96e;
    color: #c9a96e;
  }
  .popup-yes:hover { background: rgba(201,169,110,0.22); }

  .popup-no {
    background: transparent;
    border-color: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    position: absolute;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .popup-no:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); }

  .ok-emoji {
    display: none;
    font-size: 1.4rem;
    color: #c9a96e;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    margin-top: 10px;
    animation: fadeInUp 0.4s ease both;
  }

  .no-msg {
    display: none;
    font-size: 0.75rem;
    color: rgba(255,180,80,0.7);
    margin-top: 12px;
    letter-spacing: 0.1em;
    animation: shake 0.4s ease;
  }

  /* ── Wishes Screen ── */
  #screen-wishes {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #0a0a0f;
    display: none;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  #screen-wishes.show { display: flex; }

  .wishes-header {
    padding: 40px 24px 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .wishes-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    background: linear-gradient(135deg, #f5e6c8, #c9a96e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .wishes-sub {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: rgba(201,169,110,0.5);
    text-transform: uppercase;
  }
  .wishes-divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
    margin: 16px auto 0;
  }

  .wishes-scroll {
    flex: 1;
    overflow-y: auto;
    width: 100%;
    padding: 20px 24px 60px;
    scroll-behavior: smooth;
  }
  .wishes-scroll::-webkit-scrollbar { width: 4px; }
  .wishes-scroll::-webkit-scrollbar-track { background: transparent; }
  .wishes-scroll::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.25); border-radius: 2px; }

  .wishes-grid {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .wish-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 18px 0;
    border-bottom: 1px solid rgba(201,169,110,0.07);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .wish-item.visible { opacity: 1; transform: translateY(0); }

  .wish-num {
    font-size: 0.65rem;
    color: rgba(201,169,110,0.35);
    letter-spacing: 0.1em;
    min-width: 28px;
    padding-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .wish-text {
    font-size: 0.92rem;
    color: rgba(245,230,200,0.85);
    line-height: 1.65;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
  }
  .wish-emoji {
    font-size: 1rem;
    min-width: 24px;
  }

  /* ── Floating petals ── */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 1rem;
    animation: floatDown linear infinite;
    opacity: 0.4;
  }

  /* ── Animations ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes floatDown {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  @keyframes flyIn {
    from { opacity: 0; transform: scale(0) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- Screen 1: Hero -->
<div id="screen-hero">
  <span class="subtitle">A Special Gift For</span>

<script>
// ── Stars ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 160; i++) {
  stars.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.4 + 0.1,
    dir: Math.random() > 0.5 ? 1 : -1
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += s.speed * 0.01 * s.dir;
    if (s.a > 1 || s.a < 0) s.dir *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,169,110,${s.a * 0.7})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── Popup ──
function openPopup() {
  document.getElementById('popup-overlay').classList.add('show');
  positionNoBtn();
}

let noClicked = false;
let runCount = 0;

function positionNoBtn() {
  const btn = document.getElementById('no-btn');
  btn.style.position = 'absolute';
  btn.style.right = '0px';
  btn.style.top = '0px';
  btn.style.left = 'auto';
}

function clickNo() {
  noClicked = true;
  const msg = document.getElementById('no-msg');
  const btn = document.getElementById('no-btn');
  msg.style.display = 'block';
  msg.style.animation = 'none';
  setTimeout(() => msg.style.animation = 'shake 0.4s ease', 10);
  setTimeout(() => msg.style.display = 'none', 2000);
}

function runAway(btn) {
  const row = document.getElementById('btn-row');
  const rowRect = row.getBoundingClientRect();
  const boxRect = row.parentElement.getBoundingClientRect();

  runCount++;
  const corners = [
    { top: 0, left: 0 },
    { top: 0, right: 0, left: 'auto' },
    { bottom: 0, left: 0, top: 'auto' },
    { bottom: 0, right: 0, left: 'auto', top: 'auto' }
  ];
  const c = corners[runCount % corners.length];

  btn.style.transition = 'all 0.25s cubic-bezier(0.34,1.4,0.64,1)';
  Object.assign(btn.style, { top: '', left: '', right: '', bottom: '' });
  Object.assign(btn.style, c);

  if (runCount >= 2) {
    const ok = document.getElementById('ok-msg');
    ok.style.display = 'block';
    ok.style.animation = 'none';
    setTimeout(() => ok.style.animation = 'fadeInUp 0.4s ease both', 10);
    btn.style.display = 'none'; // hide no btn after 2 runs
  }
}

document.getElementById('yes-btn').addEventListener('mouseenter', function() {
  // Make no button run away on yes hover (fun trick — no btn runs, not yes)
});

document.getElementById('no-btn').addEventListener('mouseenter', function() {
  runAway(this);
});

function clickYes() {
  document.getElementById('popup-overlay').classList.remove('show');
  launchWishes();
}

function launchWishes() {
  const screen = document.getElementById('screen-wishes');
  screen.classList.add('show');
  screen.style.animation = 'fadeInUp 0.8s ease both';

  // spawn petals
  const petals = ['🌸','✨','🌺','💛','🌟','💫','🎀'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (Math.random() * 8 + 6) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    p.style.fontSize = (Math.random() * 0.8 + 0.7) + 'rem';
    screen.appendChild(p);
  }

  const grid = document.getElementById('wishes-grid');
  grid.innerHTML = '';

  wishes.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'wish-item';
    div.innerHTML = `
      <span class="wish-num">${String(i+1).padStart(2,'0')}</span>
      <span class="wish-emoji">${w[0]}</span>
      <span class="wish-text">${w[1]}</span>
    `;
    grid.appendChild(div);
  });

  // Intersection observer for stagger animation
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), 50);
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.wish-item').forEach(el => observer.observe(el));
}
</script>
